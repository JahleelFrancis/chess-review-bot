<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chess Review Bot</title>

    <link rel="stylesheet" href="/vendor/chessboard-1.0.0.min.css" />
    <link rel="stylesheet" href="/styles.css" />
  </head>

  <body>
    <div id="topbar">
      <div id="topbarLeft">
        <div id="topbarTitle">Chess Review Bot</div>
      </div>

      <form id="usernameForm">
        <div class="topbarInputWrap">
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Enter username"
            autocomplete="off"
            required
          />
        </div>
        <button type="button" id="fetchGamesButton">Fetch</button>
      </form>
    </div>

    <div id="heroSection" class="heroSection">
      <div class="heroCard">
        <h1 class="heroTitle">Chess Review Bot</h1>
        <p class="heroSubtitle">
          Search any Chess.com username to browse monthly archives, inspect
          games, and jump into move-by-move review.
        </p>

        <form id="heroUsernameForm" class="heroForm">
          <input
            id="heroUsername"
            type="text"
            placeholder="Enter a Chess.com username"
            autocomplete="off"
          />
          <button type="submit" id="heroFetchButton">Fetch Archives</button>
        </form>
      </div>
    </div>

    <div id="page">
      <div id="browseLayout">
        <div class="panel" id="archivesPanel">
          <div class="panelHeader" id="archivesHeader">Archives</div>
          <div id="archives"></div>
        </div>

        <div class="panel hidden" id="gamesPanel">
          <div class="panelHeader" id="gamesHeader">Games</div>
          <div id="games"></div>
        </div>
      </div>

      <div id="analysisLayout">
        <div id="boardColumn">
          <div class="boardPlayer boardPlayerTop">
            <div class="boardPlayerLabel">Black</div>
            <div class="boardPlayerName" id="boardPlayerTopName">—</div>
          </div>

          <div id="board"></div>

          <div class="boardPlayer boardPlayerBottom">
            <div class="boardPlayerLabel">White</div>
            <div class="boardPlayerName" id="boardPlayerBottomName">—</div>
          </div>
        </div>

        <div id="rightPanel">
          <div id="tabBar">
            <button id="tabMoves" class="tab-button" type="button" disabled>
              Moves
            </button>
            <button id="tabInfo" class="tab-button active" type="button">
              Info
            </button>
          </div>

          <div id="tabPanels">
            <div id="movesPanel" class="tab-panel active">
              <div id="moveList"></div>
            </div>

            <div id="infoPanel" class="tab-panel">
              <div id="analysis"></div>
            </div>
          </div>

          <div id="rightPanelFooter">
            <div id="analysisControls"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="/vendor/jquery.min.js"></script>
    <script src="/vendor/chessboard-1.0.0.js"></script>

    <script src="/ui.js"></script>
    <script src="/api.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
