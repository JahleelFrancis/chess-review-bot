<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Chess Review Bot</title>

    <!-- Vendor + app styles -->
    <link rel="stylesheet" href="/vendor/chessboard-1.0.0.min.css" />
    <link rel="stylesheet" href="/styles.css" />
  </head>

  <body>
    <h1>Chess Review Bot</h1>

    <form id="usernameForm">
      <label for="username">Enter your Chess.com username:</label>
      <input type="text" id="username" name="username" required />
      <button type="button" id="fetchGamesButton">Fetch Games</button>
    </form>

    <!-- Browse view layout -->
    <div id="browseLayout">
      <div class="panel" id="archivesPanel">
        <div class="panelHeader">Archives</div>
        <div id="archives"></div>
      </div>

      <div class="panel hidden" id="gamesPanel">
        <div class="panelHeader" id="gamesHeader">Games</div>
        <div id="games"></div>
      </div>
    </div>

    <!-- Analysis view layout -->
    <div id="analysisLayout">
      <div id="boardColumn">
        <div id="board"></div>
        <div id="analysisControls"></div>
      </div>

      <!-- Right panel: tabs -->
      <div id="rightPanel">
        <div id="tabBar">
          <button id="tabMoves" class="tab-button" type="button" disabled>Moves</button>
          <button id="tabInfo" class="tab-button active" type="button">Info</button>
        </div>

        <div id="tabPanels">
          <div id="movesPanel" class="tab-panel active">
            <div id="moveList"></div>
          </div>

          <div id="infoPanel" class="tab-panel">
            <div id="analysis"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Vendor scripts -->
    <script src="/vendor/jquery.min.js"></script>
    <script src="/vendor/chessboard-1.0.0.js"></script>

    <!-- App scripts -->
    <script src="/ui.js"></script>
    <script src="/api.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
